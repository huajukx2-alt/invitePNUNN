<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ชวนพี่นุ่นไปเที่ยว 💖</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            overflow: hidden; /* ป้องกันหน้าจอเลื่อนเวลาปุ่มใหญ่ขึ้นหรือหนี */
            background: linear-gradient(135deg, #fce7f3 0%, #fbcfe8 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* กล่องเนื้อหาหลัก */
        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 3rem 2rem;
            box-shadow: 0 10px 25px rgba(236, 72, 153, 0.15);
            text-align: center;
            max-width: 90%;
            width: 450px;
            z-index: 10;
        }

        /* ลูกเล่นปุ่ม */
        #yes-btn {
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 5;
        }

        #no-btn {
            transition: all 0.2s ease-out;
            z-index: 10;
            position: relative;
        }

        /* อนิเมชั่นหัวใจตกตอนตอบตกลง */
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        .falling-heart {
            position: fixed;
            z-index: 1;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- หน้าต่างคำถาม -->
    <div id="question-card" class="glass-card">
        <div class="mb-6">
            <img id="cat-gif" src="https://media1.tenor.com/m/TwtXqNlO7FsAAAAC/wow-sparkle-eyes.gif" alt="Cute Cat" class="w-32 h-32 mx-auto rounded-xl object-cover">
        </div>
        <h1 class="text-4xl font-bold text-pink-600 mb-2">พี่นุ่นนนน 🥰</h1>
        <h2 id="question-text" class="text-2xl text-pink-500 mb-8 font-medium">ไปเที่ยวเขื่อนด้วยกันไหมมมมมม 🏞️</h2>

        <div class="flex flex-row items-center justify-center gap-6 min-h-[60px]" id="button-container">
            <button id="yes-btn" class="bg-pink-500 hover:bg-pink-600 text-white font-semibold py-3 px-8 rounded-full shadow-lg text-xl">
                ไปสิ! 💖
            </button>
            <button id="no-btn" class="bg-gray-100 hover:bg-gray-200 text-gray-500 font-medium py-3 px-8 rounded-full shadow text-xl border border-gray-200">
                ไม่ไป 😝
            </button>
        </div>
    </div>

    <!-- หน้าต่างตอบตกลง (ซ่อนไว้ก่อน) -->
    <div id="success-card" class="glass-card hidden">
        <div class="mb-6">
            <img src="https://media.tenor.com/-9FF6BVgdaIAAAAj/peach-cat.gif" alt="Happy Cat" class="w-40 h-40 mx-auto rounded-xl object-cover">
        </div>
        <div class="mb-4 text-5xl">
            🎉🎒🚗
        </div>
        <h1 class="text-4xl font-bold text-pink-600 mb-4">เย้! พี่นุ่นน่ารักสุดเลยยยย 💖</h1>
        <p class="text-xl text-pink-500 font-medium">เตรียมตัวไปเขื่อนกันเลยน้าา!</p>
    </div>

    <script>
        const noBtn = document.getElementById('no-btn');
        const yesBtn = document.getElementById('yes-btn');
        const questionCard = document.getElementById('question-card');
        const successCard = document.getElementById('success-card');
        const catGif = document.getElementById('cat-gif');
        const questionText = document.getElementById('question-text');

        let noScale = 1;
        let yesScale = 1;
        let isAbsolute = false;
        let gifIndex = 0;

        // รวมลิงก์ GIF แมวเวลาโดนปฏิเสธ (งอน ร้องไห้ ทุบ โกรธ)
        const reactionGifs = [
            "https://media.tenor.com/NC9S9-pqbzkAAAAi/lucu-cute-cat.gif",
            "https://media1.tenor.com/m/8JSTqLq5ot8AAAAC/cute-blinking.gif",
            "https://media1.tenor.com/m/pjBtpAFSnmgAAAAC/peach-goma-peach-and-goma.gif",
            "https://media.tenor.com/YkGFt_3j8fsAAAAi/boba.gif",
            "https://media.tenor.com/hLgZBJ7RjzYAAAAi/cute-dog.gif"
        ];

        // รวมข้อความอ้อนเวลาโดนปฏิเสธ
        const pleadingTexts = [
            "จะไม่ไปจริงๆหรอ 🥺",
            "ไปเถอะน้าาา 🙏",
            "นะๆๆๆๆ พี่นุ่น 🥺",
            "ใจร้ายยย 😭",
            "ไปเที่ยวด้วยกันเถอะ 🥺",
            "ไม่สงสารเพชรหรอ 🥺",
            "เปลี่ยนใจเถอะน้า 🥺",
            "อย่าปฏิเสธน้องเพชรเลย 😭",
            "ไปนะๆๆๆ 💕",
            "แงงงงง ใจแข็งจัง 😭"
        ];

        // ฟังก์ชันเมื่อพยายามกดปุ่ม "ไม่ไป"
        function dodgeButton(e) {
            // ป้องกันการทำงานซ้ำซ้อนถ้าปุ่มเล็กจนหายไปแล้ว
            if (noScale <= 0) return;

            // เปลี่ยนรูป GIF เป็นรูปเศร้า/งอน วนไปเรื่อยๆ
            catGif.src = reactionGifs[gifIndex % reactionGifs.length];
            
            // เปลี่ยนข้อความคำถามเป็นข้อความอ้อนวนไปเรื่อยๆ
            questionText.innerText = pleadingTexts[gifIndex % pleadingTexts.length];
            
            gifIndex++;

            // เปลี่ยนเป็น absolute เพื่อให้วิ่งไปทั่วจอได้
            if (!isAbsolute) {
                // ย้ายปุ่มออกมาอยู่ระดับ body เพื่อไม่ให้ติดข้อจำกัดขอบเขตของกล่องกระจกใส
                const rect = noBtn.getBoundingClientRect();
                document.body.appendChild(noBtn);
                noBtn.style.position = 'fixed';
                noBtn.style.left = `${rect.left}px`;
                noBtn.style.top = `${rect.top}px`;
                noBtn.style.margin = '0'; // ลบ margin เดิมออก
                isAbsolute = true;
            }

            // ลดขนาดปุ่ม "ไม่ไป" ให้น้อยลง (ลดทีละ 0.08 จะกดได้ประมาณ 12 ครั้งถึงจะหาย)
            noScale -= 0.08;
            
            // ขยายขนาดปุ่ม "ไป" ทีละนิด
            yesScale += 0.15;
            yesBtn.style.transform = `scale(${yesScale})`;

            if (noScale <= 0.1) {
                noBtn.style.display = 'none'; // หายไปเลยถ้าเล็กเกิน
            } else {
                // ขนาดปุ่มที่แท้จริง
                const btnWidth = noBtn.offsetWidth;
                const btnHeight = noBtn.offsetHeight;
                
                // กำหนดระยะห่างจากขอบจออย่างน้อย 50px
                const safeMargin = 50; 
                const minX = safeMargin;
                const maxX = window.innerWidth - btnWidth - safeMargin;
                const minY = safeMargin;
                const maxY = window.innerHeight - btnHeight - safeMargin;

                // สุ่มตำแหน่งให้อยู่ในกรอบ (min ถึง max) อย่างแม่นยำขึ้น
                const randomX = Math.floor(Math.random() * (maxX - minX + 1)) + minX;
                const randomY = Math.floor(Math.random() * (maxY - minY + 1)) + minY;

                noBtn.style.left = `${randomX}px`;
                noBtn.style.top = `${randomY}px`;
                noBtn.style.transform = `scale(${noScale})`;
            }
        }

        // จับ Event เฉพาะการคลิกและการแตะ (มือถือ) เอา mouseover ออกเพื่อให้ต้องคลิกก่อน
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault(); // ป้องกันการเผลอกดติด
            dodgeButton();
        });
        noBtn.addEventListener('click', dodgeButton);

        // ฟังก์ชันเมื่อตอบตกลง "ไป"
        yesBtn.addEventListener('click', () => {
            questionCard.classList.add('hidden');
            successCard.classList.remove('hidden');
            
            // สร้างหัวใจตกฉลอง
            setInterval(createHeart, 300);
            for(let i=0; i<10; i++) setTimeout(createHeart, i * 100);
        });

        // ฟังก์ชันสร้างหัวใจโปรยปราย
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('falling-heart');
            
            // สุ่มอีโมจิ
            const emojis = ['💖', '💕', '🥰', '🌸', '✨'];
            heart.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
            
            // สุ่มตำแหน่งและขนาด
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 2 + 1.5) + 'rem';
            
            // สุ่มความเร็วในการตก
            const duration = Math.random() * 3 + 3;
            heart.style.animation = `fall ${duration}s linear forwards`;
            
            document.body.appendChild(heart);
            
            // ลบทิ้งเมื่อตกเสร็จ
            setTimeout(() => {
                heart.remove();
            }, duration * 1000);
        }
    </script>
</body>
</html>
